<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FnOS 卸载应用残余清理精灵</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>🧹 FnOS 卸载应用残余清理精灵</h1>
      <p class="subtitle">扫描所有 vol 目录，找出已卸载应用的残留目录文件和系统用户，一键删除</p>
    </div>
    <div class="header-controls">
      <button class="sponsor-btn" onclick="showSponsorModal()" title="赞助作者">❤️ 赞助</button>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题" aria-label="切换明暗主题">☀️</button>
      <div class="auto-toggle">
        <span>🔄 自动</span>
        <div class="switch on" id="autoSwitch" onclick="toggleAutoTheme()"></div>
      </div>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-icon blue">📦</div>
      <div class="kpi-body">
        <div class="kpi-label">已安装应用</div>
        <div class="kpi-value" id="installed-count">-</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon orange">📂</div>
      <div class="kpi-body">
        <div class="kpi-label">孤立目录</div>
        <div class="kpi-value" id="orphan-count">-</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon green">💾</div>
      <div class="kpi-body">
        <div class="kpi-label">受影响的卷</div>
        <div class="kpi-value" id="vol-count">-</div>
      </div>
    </div>
  </div>

  <div class="card" id="installed-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h2 style="margin:0;border:none;padding:0;">📋 已安装应用列表</h2>
      <button class="btn" onclick="toggleInstalledList(this)" style="padding:6px 14px;font-size:13px;">▶ 展开</button>
    </div>
    <div id="installed-list" style="display:none;"></div>
  </div>

  <div class="card">
    <h2>📂 残余目录（已安装应用不含这些目录）</h2>
    <div class="toolbar">
      <button class="btn" id="scanBtn" onclick="doScan()">🔍 开始扫描</button>
      <button class="btn btn-danger" id="deleteBtn" onclick="confirmDelete()" disabled>🗑 删除选中</button>
      <span class="select-info" id="selectInfo"></span>
    </div>
    <div id="status"></div>
    <div id="orphan-list" style="margin-top:16px;"></div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal-overlay" id="confirmModal" style="display:none;">
  <div class="modal">
    <h3>⚠️ 确认删除</h3>
    <p>即将删除以下 <strong id="confirmCount">0</strong> 个目录（共 <strong id="confirmPathsCount">0</strong> 个子目录）：</p>
    <div class="paths-preview" id="confirmPaths"></div>
    <p style="color:#dc2626;font-size:13px;">⚠️ 此操作不可恢复，请谨慎操作！</p>
    <label style="display:flex;align-items:center;gap:8px;margin:12px 0;font-size:13px;cursor:pointer;">
      <input type="checkbox" id="deleteUsersCheckbox" style="width:16px;height:16px;">
      <span>同步删除关联系统用户（appname / appname-docker）</span>
    </label>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" onclick="doDelete()">确认删除</button>
    </div>
  </div>
</div>

<script src="./js/main.js"></script>

<!-- 赞助弹窗 -->
<div id="sponsorModal" class="sponsor-modal-overlay" onclick="if(event.target===this)this.style.display='none'">
  <div class="sponsor-modal-content" onclick="event.stopPropagation()">
    <div class="sponsor-header">
      <h3>❤️ 感谢您的支持</h3>
      <button class="sponsor-modal-close" onclick="document.getElementById('sponsorModal').style.display='none'">✕</button>
    </div>
    <p>您的赞助是我持续开发的最大动力</p>
    <div class="sponsor-qr-row">
      <div class="sponsor-qr-item">
        <p>💙 支付宝</p>
        <img src="./images/sponsor_alipay.png" onclick="showSponsorImgFull(this)">
      </div>
      <div class="sponsor-qr-item">
        <p class="wx">💚 微信</p>
        <img class="wx" src="./images/sponsor_wechat.png" onclick="showSponsorImgFull(this)">
      </div>
    </div>
  </div>
</div>
<div id="sponsorImgOverlay" class="sponsor-img-full-overlay" onclick="if(event.target===this)this.style.display='none'">
  <img id="sponsorImgFull" onclick="event.stopPropagation()">
</div>

<!-- 页脚版权信息 -->
<div class="footer">
  Copyright © 2022-2026 <a href="https://gitee.com/wyf1015" target="_blank">一零一二</a> · FnOS 残余清理精灵
</div>
</body>
</html>
