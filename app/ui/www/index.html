<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FnOS 卸载应用残余清理精灵</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #333; }
  .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
  h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a2e; }
  .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
  .card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .card h2 { font-size: 16px; margin-bottom: 12px; color: #444; border-bottom: 1px solid #eee; padding-bottom: 8px; }
  .btn { display: inline-block; padding: 10px 24px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; outline: none; }
  .btn:focus-visible { box-shadow: 0 0 0 3px rgba(59,130,246,0.5); }
  .btn:hover { background: #2563eb; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .btn-danger { background: #dc2626; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-danger:disabled { background: #ccc; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 13px; }
  th { background: #f8fafc; color: #555; font-weight: 600; }
  tr:hover { background: #f8fafc; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
  .badge-blue { background: #dbeafe; color: #1d4ed8; }
  .badge-orange { background: #ffedd5; color: #c2410c; }
  .badge-red { background: #fee2e2; color: #dc2626; }
  .badge-green { background: #dcfce7; color: #16a34a; }
  #status { margin-top: 12px; font-size: 13px; color: #666; }
  .loading { color: #3b82f6; }
  .error { color: #dc2626; }
  .success { color: #16a34a; }
  .empty { text-align: center; padding: 40px; color: #999; }
  .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
  .kpi-card { background: #fff; border-radius: 14px; padding: 20px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 16px; transition: box-shadow 0.2s, transform 0.2s; }
  .kpi-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-1px); }
  .kpi-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .kpi-icon.blue { background: linear-gradient(135deg, #3b82f6, #60a5fa); color: #fff; }
  .kpi-icon.orange { background: linear-gradient(135deg, #f97316, #fb923c); color: #fff; }
  .kpi-icon.green { background: linear-gradient(135deg, #16a34a, #4ade80); color: #fff; }
  .kpi-body { min-width: 0; }
  .kpi-label { font-size: 12px; color: #6b7280; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kpi-value { font-size: 26px; font-weight: 700; color: #1a1a2e; line-height: 1.2; margin-top: 2px; }
  .kpi-sub { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .table-wrapper { max-height: 500px; overflow-y: auto; }
  .orphan-table { width: 100%; border-collapse: collapse; }
  .orphan-table th, .orphan-table td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 13px; }
  .orphan-table th { background: #f8fafc; position: sticky; top: 0; z-index: 1; }
  .orphan-table tr:hover { background: #f8fafc; }
  .paths-cell { font-family: monospace; font-size: 12px; color: #6b7280; max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .paths-cell:hover { overflow: visible; white-space: normal; word-break: break-all; }
  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
  .toolbar .select-info { font-size: 13px; color: #666; }
  input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: #fff; border-radius: 12px; padding: 32px; max-width: 500px; width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
  .modal h3 { font-size: 18px; margin-bottom: 16px; }
  .modal p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 8px; }
  .modal .paths-preview { background: #f8fafc; border-radius: 8px; padding: 12px; margin: 12px 0; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; color: #333; }
  .modal .btn-row { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
  .modal .btn-cancel { background: #e5e7eb; color: #333; }
  .modal .btn-cancel:hover { background: #d1d5db; }

  /* 深色主题 */
  :root.dark {
    --bg: #1a1a2e;
    --card-bg: #16213e;
    --text: #e0e0e0;
    --text-secondary: #a0a0a0;
    --border: #2a2a4a;
    --input-bg: #1e2748;
    --hover-bg: #1f2b47;
  }
  :root.dark body { background: var(--bg); color: var(--text); }
  :root.dark .card { background: var(--card-bg); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  :root.dark h1, :root.dark h2 { color: var(--text); border-color: var(--border); }
  :root.dark .subtitle { color: var(--text-secondary); }
  :root.dark .kpi-card { background: var(--card-bg); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  :root.dark .kpi-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  :root.dark .kpi-label { color: var(--text-secondary); }
  :root.dark .kpi-value { color: var(--text); }
  :root.dark .kpi-sub { color: var(--text-secondary); }
  :root.dark .info-row { flex-direction: column; gap: 8px; }
  :root.dark .info-box .value { font-size: 16px; }
  :root.dark .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
  :root.dark .btn-danger { background: #dc2626; }
  :root.dark .btn-danger:hover { background: #ef4444; }
  :root.dark .btn-danger:disabled { background: #444; color: #888; cursor: not-allowed; }
  :root.dark .btn-cancel { background: #374151; color: #e0e0e0; }
  :root.dark .btn-cancel:hover { background: #4b5563; }
  :root.dark th, :root.dark td { border-bottom: 1px solid var(--border); color: var(--text); }
  :root.dark th { background: var(--input-bg); color: var(--text-secondary); }
  :root.dark tr:hover { background: var(--hover-bg); }
  :root.dark .orphan-table th { background: var(--input-bg); }
  :root.dark .orphan-table tr:hover { background: var(--hover-bg); }
  :root.dark .paths-cell { color: var(--text-secondary); }
  :root.dark .toolbar .select-info { color: var(--text-secondary); }
  :root.dark #status { color: var(--text-secondary); }
  :root.dark .loading { color: #60a5fa; }
  :root.dark .error { color: #f87171; }
  :root.dark .success { color: #4ade80; }
  :root.dark .empty { color: var(--text-secondary); }
  :root.dark .modal { background: var(--card-bg); }
  :root.dark .modal h3 { color: var(--text); }
  :root.dark .modal p { color: var(--text-secondary); }
  :root.dark .modal .paths-preview { background: var(--input-bg); color: var(--text); }
  :root.dark .modal .btn-cancel { background: #374151; color: #e0e0e0; }
  :root.dark input[type="checkbox"] { accent-color: #3b82f6; }
  :root.dark .badge-blue { background: #1e3a5f; color: #60a5fa; }
  :root.dark .badge-orange { background: #3d2a1a; color: #fb923c; }
  :root.dark .badge-red { background: #7f1d1d; color: #fca5a5; }
  :root.dark .badge-green { background: #1a3d1a; color: #4ade80; }
  :root.dark .header { border-bottom: 1px solid var(--border); }
  :root.dark .header-controls { border-color: var(--border); }
  :root.dark .sponsor-btn { background: #374151; color: #f472b6; border-color: #4b5563; }
  :root.dark .sponsor-btn:hover { background: #4b5563; }
  :root.dark .theme-toggle { background: var(--input-bg); }
  :root.dark .theme-toggle:hover { background: var(--hover-bg); }
  :root.dark .auto-toggle { color: var(--text-secondary); }
  :root.dark .auto-toggle .switch { background: #374151; }
  :root.dark .auto-toggle .switch.on { background: #3b82f6; }
  :root.dark .sponsor-modal-content { background: var(--card-bg); }
  :root.dark .sponsor-modal-content h3 { color: #f59e0b; }
  :root.dark .sponsor-modal-content p { color: var(--text-secondary); }

  /* 头部布局 */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 20px;
    margin-bottom: 24px;
    border-bottom: 1px solid #e5e7eb;
  }
  .header-left h1 { margin-bottom: 4px; }
  .header-left .subtitle { margin-bottom: 0; }
  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* 赞助按钮 */
  .sponsor-btn {
    padding: 8px 16px;
    background: #fce7f3;
    color: #ec4899;
    border: 1px solid #fbcfe8;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .sponsor-btn:hover { background: #fce7f3; box-shadow: 0 2px 8px rgba(236,72,153,0.2); }

  /* 主题切换 */
  .theme-toggle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #e5e7eb;
    transition: background 0.2s;
  }
  .theme-toggle:hover { background: #d1d5db; }

  /* 自动切换开关 */
  .auto-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #666;
    user-select: none;
  }
  .auto-toggle .switch {
    position: relative;
    width: 36px;
    height: 20px;
    background: #ccc;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .auto-toggle .switch::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .auto-toggle .switch.on { background: #3b82f6; }
  .auto-toggle .switch.on::after { transform: translateX(16px); }

  /* 赞助弹窗 */
  .sponsor-modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 9999;
  }
  .sponsor-modal-content {
    background: #fff;
    border-radius: 16px;
    max-width: 500px;
    margin: 60px auto;
    padding: 24px;
    text-align: center;
  }
  /* Token 认证模态框（登录+设置共用样式） */
  .auth-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    z-index: 99999;
    align-items: center;
    justify-content: center;
  }
  .auth-overlay.active { display: flex; }
  .auth-card {
    background: #fff;
    border-radius: 20px;
    padding: 40px 36px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .auth-icon { font-size: 48px; margin-bottom: 12px; }
  .auth-card h2 { color: #1a1a2e; font-size: 22px; margin-bottom: 8px; }
  .auth-card p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
  .auth-card input[type="password"], .auth-card input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 8px;
    box-sizing: border-box;
  }
  .auth-card input:focus { border-color: #3b82f6; }
  .btn-auth {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #3b82f6, #60a5fa);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
  }
  .btn-auth:hover { opacity: 0.9; }
  .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }
  .auth-error { color: #dc2626; font-size: 13px; margin-top: 8px; min-height: 18px; }
  .auth-hint { color: #9ca3af; font-size: 12px; margin-top: 12px; }
  .sponsor-modal-content .sponsor-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .sponsor-modal-content h3 { color: #f59e0b; margin: 0; }
  .sponsor-modal-close {
    background: #e2e8f0;
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 16px;
  }
  .sponsor-modal-content > p { color: #64748b; margin-bottom: 20px; }
  .sponsor-qr-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .sponsor-qr-item p { color: #1677ff; font-weight: 600; margin-bottom: 8px; }
  .sponsor-qr-item p.wx { color: #07c160; }
  .sponsor-qr-item img {
    width: 160px; height: 160px;
    border: 3px solid #1677ff;
    border-radius: 12px;
    padding: 8px;
    background: #fff;
    cursor: zoom-in;
  }
  .sponsor-qr-item img.wx { border-color: #07c160; }
  .sponsor-img-full-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.9);
    z-index: 99999;
    cursor: zoom-out;
    align-items: center;
    justify-content: center;
  }
  .sponsor-img-full-overlay img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 8px;
    border: 4px solid #fff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  :root.dark .sponsor-img-full-overlay img {
    border-color: #e0e0e0;
  }
  :root.dark .auth-overlay { background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); }
  :root.dark .auth-card { background: #161b22; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  :root.dark .auth-card h2 { color: #e0e0e0; }
  :root.dark .auth-card p { color: #a0a0a0; }
  :root.dark .auth-card input[type="password"], :root.dark .auth-card input[type="text"] {
    background: #0d1117; border-color: #30363d; color: #e0e0e0;
  }
  :root.dark .auth-card input[type="password"]:focus, :root.dark .auth-card input[type="text"]:focus { border-color: #3b82f6; }
  :root.dark .auth-error { color: #f87171; }
  :root.dark .auth-hint { color: #6b7280; }
  :root.dark .sponsor-modal-close { background: #30363d; color: #e0e0e0; }
  :root.dark .sponsor-modal-close:hover { background: #484f58; }
  :root.dark .sponsor-qr-item p { color: #60a5fa; font-weight: 600; margin-bottom: 8px; }
  :root.dark .sponsor-qr-item p.wx { color: #4ade80; }
  :root.dark .sponsor-qr-item img { border-color: #60a5fa; background: #0d1117; }
  :root.dark .sponsor-qr-item img.wx { border-color: #4ade80; }
  :root.dark .sponsor-img-full-overlay { background: rgba(0,0,0,0.95); }

  /* 亮色主题变量 */
  :root:not(.dark) {
    --hover-bg: #f1f5f9;
  }

  /* 通用 hover 背景色 */
  :root:not(.dark) tr:hover { background: var(--hover-bg); }
  :root:not(.dark) .orphan-table tr:hover { background: var(--hover-bg); }
  :root.dark tr:hover { background: var(--hover-bg); }
  :root.dark .orphan-table tr:hover { background: var(--hover-bg); }
  /* 页脚版权信息 */
  .footer { padding: 20px; text-align: center; color: #64748b; font-size: 13px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,.06); }
  .footer a { color: #00d4ff; text-decoration: none; transition: all .2s; }
  .footer a:hover { color: #a855f7; text-decoration: underline; }
  :root.dark .footer { color: #94a3b8; border-top-color: rgba(255,255,255,.06); }

  /* ========== 响应式适配 ========== */
  @media (max-width: 768px) {
    .container { padding: 20px 12px; }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .header-controls { width: 100%; justify-content: flex-start; }
    .kpi-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .kpi-card { padding: 12px 8px; gap: 8px; }
    .kpi-icon { width: 32px; height: 32px; font-size: 16px; border-radius: 8px; }
    .kpi-label { font-size: 10px; }
    .kpi-value { font-size: 18px; }
    .info-row { flex-direction: column; gap: 8px; }
    .info-box .value { font-size: 16px; }
    .toolbar { flex-wrap: wrap; }
    .orphan-table { display: block; overflow-x: auto; white-space: nowrap; }
    .orphan-table th, .orphan-table td { white-space: nowrap; }
    .table-wrapper { max-height: 300px; }
    .modal { padding: 20px; max-width: 95%; }
  }

  /* ========== prefers-reduced-motion ========== */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ========== 赞助弹窗 ========== */
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>🧹 FnOS 卸载应用残余清理精灵</h1>
      <p class="subtitle">扫描所有 vol 目录，找出未已卸载应用的残留目录文件和系统用户，一键删除</p>
    </div>
    <div class="header-controls">
      <button class="sponsor-btn" onclick="showSponsorModal()" title="赞助作者">❤️ 赞助</button>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题" aria-label="切换明暗主题">☀️</button>
      <div class="auto-toggle">
        <span>🔄 自动</span>
        <div class="switch on" id="autoSwitch" onclick="toggleAutoTheme()"></div>
      </div>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-icon blue">📦</div>
      <div class="kpi-body">
        <div class="kpi-label">已安装应用</div>
        <div class="kpi-value" id="installed-count">-</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon orange">📂</div>
      <div class="kpi-body">
        <div class="kpi-label">孤立目录</div>
        <div class="kpi-value" id="orphan-count">-</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon green">💾</div>
      <div class="kpi-body">
        <div class="kpi-label">受影响的卷</div>
        <div class="kpi-value" id="vol-count">-</div>
      </div>
    </div>
  </div>

  <div class="card" id="installed-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h2 style="margin:0;border:none;padding:0;">📋 已安装应用列表</h2>
      <button class="btn" onclick="toggleInstalledList(this)" style="padding:6px 14px;font-size:13px;">▶ 展开</button>
    </div>
    <div id="installed-list" style="display:none;"></div>
  </div>

  <div class="card">
    <h2>📂 残余目录（已安装应用不含这些目录）</h2>
    <div class="toolbar">
      <button class="btn" id="scanBtn" onclick="doScan()">🔍 开始扫描</button>
      <button class="btn btn-danger" id="deleteBtn" onclick="confirmDelete()" disabled>🗑 删除选中</button>
      <span class="select-info" id="selectInfo"></span>
    </div>
    <div id="status"></div>
    <div id="orphan-list" style="margin-top:16px;"></div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal-overlay" id="confirmModal" style="display:none;">
  <div class="modal">
    <h3>⚠️ 确认删除</h3>
    <p>即将删除以下 <strong id="confirmCount">0</strong> 个目录（共 <strong id="confirmPathsCount">0</strong> 个子目录）：</p>
    <div class="paths-preview" id="confirmPaths"></div>
    <p style="color:#dc2626;font-size:13px;">⚠️ 此操作不可恢复，请谨慎操作！</p>
    <label style="display:flex;align-items:center;gap:8px;margin:12px 0;font-size:13px;cursor:pointer;">
      <input type="checkbox" id="deleteUsersCheckbox" style="width:16px;height:16px;">
      <span>同步删除关联系统用户（appname / appname-docker）</span>
    </label>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" onclick="doDelete()">确认删除</button>
    </div>
  </div>
</div>

<script>
let installedApps = [];
let orphanData = {};  // {子目录名: [完整路径列表]}
let autoThemeTimer = null;
let autoThemeEnabled = localStorage.getItem('autoThemeEnabled') !== 'false';  // 默认开启

// 检测系统主题是否深色
function isSystemDark() {
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
}

// 深色时段: 22:00 - 06:00 或系统深色模式
function isDarkTime() {
  const h = new Date().getHours();
  const isNightTime = h >= 22 || h < 6;
  if (autoThemeEnabled) {
    // 夜间时段强制深色，否则跟随系统主题
    return isNightTime || isSystemDark();
  }
  // 手动模式：仅根据时段
  return isNightTime;
}

function applyTheme(dark) {
  if (dark) {
    document.documentElement.classList.add('dark');
    document.getElementById('themeToggle').textContent = '☀️';
  } else {
    document.documentElement.classList.remove('dark');
    document.getElementById('themeToggle').textContent = '🌙';
  }
}

function applyAutoTheme() {
  if (!autoThemeEnabled) return;
  applyTheme(isDarkTime());
}

function scheduleAutoTheme() {
  if (autoThemeTimer) clearInterval(autoThemeTimer);
  autoThemeTimer = setInterval(() => {
    if (autoThemeEnabled) applyTheme(isDarkTime());
  }, 30000); // 每30秒检查一次
  // 监听系统主题变化
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (autoThemeEnabled) applyTheme(isDarkTime());
    });
  }
  // 立即应用一次（无论auto是否开启，先设置正确的初始主题）
  applyTheme(isDarkTime());
  const sw = document.getElementById('autoSwitch');
  if (autoThemeEnabled) {
    sw.classList.add('on');
  } else {
    sw.classList.remove('on');
  }
}

let manualOverride = false;
function toggleTheme() {
  manualOverride = true;
  const isDark = document.documentElement.classList.contains('dark');
  applyTheme(!isDark);
  if (autoThemeTimer) clearInterval(autoThemeTimer);
  // 60秒后恢复自动
  setTimeout(() => {
    manualOverride = false;
    scheduleAutoTheme();
  }, 60000);
}

function toggleAutoTheme() {
  autoThemeEnabled = !autoThemeEnabled;
  localStorage.setItem('autoThemeEnabled', autoThemeEnabled);
  const sw = document.getElementById('autoSwitch');
  if (autoThemeEnabled) {
    sw.classList.add('on');
    applyTheme(isDarkTime());
    // 恢复定时检查
    if (autoThemeTimer) clearInterval(autoThemeTimer);
    autoThemeTimer = setInterval(() => {
      if (autoThemeEnabled) applyTheme(isDarkTime());
    }, 30000);
  } else {
    sw.classList.remove('on');
    // 关闭时不切换主题，保持当前状态
  }
}

// ========== 全局状态 ==========

// ========== 初始化 ==========
window.onload = function() {
  scheduleAutoTheme();
  doScan();
};

function toggleInstalledList(btn) {
  const list = document.getElementById("installed-list");
  const isHidden = list.style.display === "none";
  if (isHidden) {
    list.style.display = "block";
    btn.textContent = "▼ 收起";
  } else {
    list.style.display = "none";
    btn.textContent = "▶ 展开";
  }
}

async function doScan() {
  const btn = document.getElementById("scanBtn");
  const status = document.getElementById("status");
  btn.disabled = true;
  status.className = "loading";
  status.textContent = "⏳ 正在扫描...";
  // 扫描期间按钮显示 spinner
  btn.textContent = "⏳ 扫描中...";
  document.getElementById("orphan-list").innerHTML = "";
  document.getElementById("deleteBtn").disabled = true;
  document.getElementById("selectInfo").textContent = "";

  try {
    const apiBase = './';
    console.log('Fetching:', apiBase + 'api/scan');
    const res = await fetch(apiBase + 'api/scan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({})
    });
    if (!res.ok) {
      const err = await res.text();
      console.error('API error:', res.status, err);
      status.textContent = '❌ 请求失败: ' + res.status;
      status.className = 'error';
      btn.disabled = false;
      btn.textContent = '🔍 开始扫描';
      return;
    }
    const data = await res.json();
    installedApps = data.installed || [];
    // 兼容新后端格式：数组 [{app, vol, path, dirs}] -> 对象 {子目录名: [完整路径]}
    if (Array.isArray(data.orphan)) {
      orphanData = {};
      for (const item of data.orphan) {
        const subName = item.app;
        if (!orphanData[subName]) orphanData[subName] = [];
        orphanData[subName].push(item.path);
      }
    } else {
      orphanData = data.orphan || {};
    }

    document.getElementById("installed-count").textContent = installedApps.length;
    document.getElementById("orphan-list").innerHTML = "";

    const orphanNames = Object.keys(orphanData);
    const totalOrphan = orphanNames.length;

    // 计算涉及的 vol 数量
    const volsUsed = new Set();
    for (const paths of Object.values(orphanData)) {
      for (const p of paths) {
        const m = p.match(/^\/(vol\d+)\//);
        if (m) volsUsed.add(m[1]);
      }
    }

    document.getElementById("orphan-count").textContent = totalOrphan;
    document.getElementById("vol-count").textContent = volsUsed.size;

    if (totalOrphan === 0) {
      document.getElementById("orphan-list").innerHTML =
        "<div class='empty'>🎉 没有发现残余目录，所有目录都有对应的已安装应用</div>";
    } else {
      let html = `<div class="table-wrapper"><table class="orphan-table"><thead><tr><th style="width:40px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th><th>子目录名</th><th>所在 vol 目录</th><th>完整路径</th></tr></thead><tbody>`;
      for (const subName of orphanNames) {
        const paths = orphanData[subName];
        const vols = [];
        const seenVols = new Set();
        for (const p of paths) {
          const m = p.match(/^\/(vol\d+)\//);
          if (m && !seenVols.has(m[1])) {
            seenVols.add(m[1]);
            vols.push(m[1]);
          }
        }
        const volStr = vols.join(", ");
        const pathsStr = paths.join("\n");
        const cbId = "cb_" + subName.replace(/[^a-zA-Z0-9]/g, "_");
        const firstPath = (paths[0] || "").replace(/"/g, "&quot;");
        html += `<tr>
          <td><input type="checkbox" class="row-cb" id="${cbId}" data-subname="${subName}" data-fullpath="${firstPath}" onchange="updateSelectInfo()"></td>
          <td style="font-family:monospace;font-size:13px;white-space:nowrap;">${subName}</td>
          <td style="font-family:monospace;font-size:13px;color:#666;">${volStr}</td>
          <td class="paths-cell" title="${pathsStr.replace(/"/g, '&quot;')}">${pathsStr}</td>
        </tr>`;
      }
      html += "</tbody></table></div>";
      document.getElementById("orphan-list").innerHTML = html;
    }

    if (installedApps.length > 0) {
      // installedApps: ["appId", "appId", ...]
      // 通过扫描结果带回的详情渲染（显示 app name 即可）
      let ihtml = "<table><thead><tr><th>显示名称</th><th>应用标识</th></tr></thead><tbody>";
      for (const app of installedApps) {
        const appname = typeof app === 'object' ? app.appname : app;
        const displayName = typeof app === 'object' ? app.display_name : app;
        ihtml += `<tr><td>${displayName}</td><td style="font-family:monospace;font-size:13px;">${appname}</td></tr>`;
      }
      ihtml += "</tbody></table>";
      document.getElementById("installed-list").innerHTML = ihtml;
    }

    status.className = "success";
    status.textContent = "✅ 扫描完成";
  } catch (e) {
    status.className = "error";
    status.textContent = "❌ 扫描失败: " + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "🔍 开始扫描";
  }
}

function toggleSelectAll(el) {
  document.querySelectorAll(".row-cb").forEach(cb => cb.checked = el.checked);
  updateSelectInfo();
}

function updateSelectInfo() {
  const checked = document.querySelectorAll(".row-cb:checked");
  const deleteBtn = document.getElementById("deleteBtn");
  const selectInfo = document.getElementById("selectInfo");
  if (checked.length > 0) {
    deleteBtn.disabled = false;
    let totalDirs = 0;
    for (const cb of checked) {
      const subName = cb.dataset.subname;
      totalDirs += (orphanData[subName] || []).length;
    }
    selectInfo.textContent = `已选 ${checked.length} 个子目录，共 ${totalDirs} 个路径`;
  } else {
    deleteBtn.disabled = true;
    selectInfo.textContent = "";
  }
}

function confirmDelete() {
  const checked = document.querySelectorAll(".row-cb:checked");
  if (checked.length === 0) return;

  const allPaths = [];
  for (const cb of checked) {
    // 优先用 orphanData（扫描时缓存），fallback 到 data-fullpath（直接在 DOM 上）
    const subName = cb.dataset.subname;
    if (orphanData[subName] && orphanData[subName].length > 0) {
      allPaths.push(...orphanData[subName]);
    } else if (cb.dataset.fullpath) {
      allPaths.push(cb.dataset.fullpath);
    }
  }

  document.getElementById("confirmCount").textContent = checked.length;
  document.getElementById("confirmPathsCount").textContent = allPaths.length;
  document.getElementById("confirmPaths").innerHTML = allPaths.map(p => `<div>${p}</div>`).join("");
  document.getElementById("confirmModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("confirmModal").style.display = "none";
  document.getElementById("deleteUsersCheckbox").checked = false;
}

async function doDelete() {
  const checked = document.querySelectorAll(".row-cb:checked");
  if (checked.length === 0) return;

  const allPaths = [];
  for (const cb of checked) {
    const subName = cb.dataset.subname;
    if (orphanData[subName] && orphanData[subName].length > 0) {
      allPaths.push(...orphanData[subName]);
    } else if (cb.dataset.fullpath) {
      allPaths.push(cb.dataset.fullpath);
    }
  }

  // 在关闭弹窗前先读取复选框值
  const checkbox = document.getElementById("deleteUsersCheckbox");
  const deleteUsers = checkbox ? checkbox.checked : false;
  console.log("checkbox element:", checkbox, "checked:", deleteUsers);
  console.log("allPaths to delete:", allPaths);

  closeModal();
  const status = document.getElementById("status");
  status.className = "loading";
  status.textContent = "⏳ 正在删除...";

  try {
    const deleteUrl = './api/delete';
    console.log('Fetching delete:', deleteUrl);
    const res = await fetch(deleteUrl, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({paths: allPaths, delete_users: deleteUsers})
    });
    const result = await res.json();

    const total = result.total || 0;
    const failures = result.failures || 0;
    const usersDeleted = result.users_deleted || [];
    const usersFailed = result.users_failed || [];

    // 构建结果消息
    let msg = `📁 已删除目录: ${total} 个`;
    if (failures > 0) msg += `，失败 ${failures} 个`;
    if (usersDeleted.length > 0) msg += `\n👤 已删除用户: ${usersDeleted.length} 个 (${usersDeleted.join(', ')})`;
    if (usersFailed.length > 0) msg += `\n❌ 用户删除失败: ${usersFailed.length} 个 (${usersFailed.join(', ')})`;

    status.className = (failures > 0 || usersFailed.length > 0) ? "warning" : "success";
    status.textContent = msg;
    alert(msg);

    // 重新扫描
    setTimeout(() => doScan(), 1000);
  } catch (e) {
    status.className = "error";
    status.textContent = "❌ 删除失败: " + e.message;
  }
}

// 赞助弹窗
function showSponsorModal() {
  document.getElementById('sponsorModal').style.display = 'block';
}
function showSponsorImgFull(img) {
  document.getElementById('sponsorImgFull').src = img.src;
  document.getElementById('sponsorImgOverlay').style.display = 'flex';
}
</script>
